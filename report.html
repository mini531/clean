<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신고 등록 — 하천·계곡 불법시설 정비 지원시스템</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/report.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div class="app-layout">

  <!-- 헤더 -->
  <header class="app-header" role="banner">
    <div class="header-logo">
      <div class="logo-mark" aria-hidden="true">
        <img src="assets/img/main_logo.png" alt="시스템 로고" onerror="this.style.display='none'">
      </div>
      <span class="header-title">
        <span class="title-full">하천·계곡 및 주변 지역 불법 시설 정비 지원시스템</span>
        <span class="title-short">불법시설 정비</span>
      </span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name">사용자</span>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="Auth.logout()">로그아웃</button>
    </div>
    <button class="btn-hamburger" id="btn-hamburger" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="app-body">
    <!-- 사이드바 -->
    <nav class="app-sidebar" aria-label="주요 메뉴">
      <div class="sidebar-section">
        <div class="sidebar-label">메인</div>
        <a href="dashboard.html" class="sidebar-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-text">지도 대시보드</span>
        </a>
        <a href="report.html" class="sidebar-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span class="nav-text">신고 등록</span>
        </a>
        <a href="stats.html" class="sidebar-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span class="nav-text">통계·현황</span>
        </a>
      </div>
    </nav>

    <!-- 메인 -->
    <main class="app-main">
      <div class="page-content" style="max-width:760px;margin:0 auto;">
        <div class="page-header">
          <div>
            <h1 class="page-title">불법시설 신고 등록</h1>
            <p class="page-subtitle">하천·계곡 주변 불법 시설을 신고합니다</p>
          </div>
          <a href="dashboard.html" class="btn btn-secondary btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            대시보드로
          </a>
        </div>

        <!-- 단계 표시 -->
        <div class="step-indicator" id="step-indicator">
          <div class="step active" id="step1">
            <div class="step-num">1</div>
            <span>위치 선택</span>
          </div>
          <div class="step-line" id="line1"></div>
          <div class="step" id="step2">
            <div class="step-num">2</div>
            <span>정보 입력</span>
          </div>
          <div class="step-line" id="line2"></div>
          <div class="step" id="step3">
            <div class="step-num">3</div>
            <span>제출 완료</span>
          </div>
        </div>

        <form id="report-form" novalidate>
          <!-- ── Step 1: 위치 선택 ── -->
          <section class="card mb-2" id="section-step1">
            <div class="card-header">
              <span>① 위치 선택</span>
              <span style="font-size:var(--font-size-xs);color:var(--text-muted);font-weight:400;">지도를 클릭하여 위치를 지정하세요</span>
            </div>
            <div class="card-body">
              <div id="report-map" role="application" aria-label="신고 위치 선택 지도"></div>
              <p class="coord-display" id="coord-display">지도를 클릭하면 좌표가 표시됩니다.</p>
              <input type="hidden" id="report-lat" name="lat">
              <input type="hidden" id="report-lng" name="lng">
            </div>
          </section>

          <!-- ── Step 2: 정보 입력 ── -->
          <section class="card mb-2" id="section-step2">
            <div class="card-header">② 시설 정보 입력</div>
            <div class="card-body">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" class="mb-2">
                <div class="form-group">
                  <label for="rep-name" class="required">시설명</label>
                  <input type="text" id="rep-name" class="form-control" placeholder="예) 한강변 불법 캠핑장" required>
                  <span class="form-error"></span>
                </div>
                <div class="form-group">
                  <label for="rep-type" class="required">시설 유형</label>
                  <select id="rep-type" class="form-control" required>
                    <option value="">선택하세요</option>
                    <option value="building">무허가 건축물</option>
                    <option value="occupation">불법 점용 시설</option>
                    <option value="waste">폐기물 투기</option>
                    <option value="camping">불법 야영 시설</option>
                    <option value="sign">불법 광고물</option>
                    <option value="structure">임시 구조물</option>
                  </select>
                  <span class="form-error"></span>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" class="mb-2">
                <div class="form-group">
                  <label for="rep-category" class="required">구분</label>
                  <select id="rep-category" class="form-control" required>
                    <option value="">선택하세요</option>
                    <option value="crossing">걸침 (하천 경계에 걸쳐있음)</option>
                    <option value="inside">구역내 (하천 구역 내부)</option>
                  </select>
                  <span class="form-error"></span>
                </div>
                <div class="form-group">
                  <label for="rep-area">추정 면적 (㎡)</label>
                  <input type="number" id="rep-area" class="form-control" placeholder="예) 150" min="1">
                </div>
              </div>

              <div class="form-group mb-2">
                <label for="rep-address" class="required">주소</label>
                <input type="text" id="rep-address" class="form-control" placeholder="예) 경기도 가평군 청평면 …" required>
                <span class="form-error"></span>
              </div>

              <div class="form-group mb-2">
                <label for="rep-region" class="required">지역 (시도)</label>
                <select id="rep-region" class="form-control" required>
                  <option value="">선택하세요</option>
                </select>
                <span class="form-error"></span>
              </div>

              <div class="form-group mb-2">
                <label for="rep-desc">상세 설명</label>
                <textarea id="rep-desc" class="form-control" rows="3"
                  placeholder="불법 시설의 상태, 규모, 위험 정도 등을 상세히 기술해 주세요."></textarea>
              </div>

              <!-- 사진 업로드 UI -->
              <div class="form-group">
                <label>현장 사진 첨부</label>
                <div class="upload-zone" role="button" tabindex="0" aria-label="사진 업로드"
                     onclick="document.getElementById('rep-files').click()"
                     onkeydown="if(event.key==='Enter')document.getElementById('rep-files').click()">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                  <p>클릭하거나 파일을 끌어다 놓으세요<br><small>JPG, PNG, GIF 최대 10MB / 최대 5개</small></p>
                  <div id="file-preview" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;"></div>
                </div>
                <input type="file" id="rep-files" accept="image/*" multiple style="display:none"
                       onchange="previewFiles(this)">
              </div>
            </div>
          </section>

          <!-- 제출 버튼 -->
          <div class="d-flex gap-2" style="justify-content:flex-end;">
            <a href="dashboard.html" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary" id="btn-submit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              신고 제출
            </button>
          </div>
        </form>

        <!-- 완료 화면 (숨김) -->
        <div id="complete-section" class="hidden text-center" style="padding:48px 24px;">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--success-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">신고가 접수되었습니다</h2>
          <p style="color:var(--text-muted);font-size:var(--font-size-sm);margin-bottom:24px;">담당자가 확인 후 현장 조사를 진행합니다.</p>
          <div class="d-flex gap-2" style="justify-content:center;">
            <a href="dashboard.html" class="btn btn-primary">지도 대시보드</a>
            <a href="stats.html"     class="btn btn-secondary">통계·현황</a>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/report.js"></script>
</body>
</html>
</body>
</html>
