    <h2 class="page-title">자주 묻는 질문</h2>

    </div>

  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const faqs = [
      { category: '시설물 조회', q: '불법 시설물의 \'걸침\'과 \'구역내\'는 무슨 뜻인가요?', a: `<p><b>'걸침'</b>은 하천 구역 경계선을 걸쳐서 위치한 시설물, <b>'구역내'</b>는 하천·계곡 구역 내부에 완전히 위치한 시설물을 말합니다.</p><ul><li><b>걸침:</b> 시설물의 일부가 하천 구역 안에, 일부가 밖에 위치</li><li><b>구역내:</b> 하천법에 따라 허가 없이 설치된 불법 구조물</li></ul><p>대시보드 좌측 패널에서 시·도별 건수를 확인할 수 있습니다.</p>`, author: '관리자', date: '2026-03-20' },
      { category: '시설물 조회', q: '특정 지역의 불법 시설물 목록은 어떻게 확인하나요?', a: `<p>두 가지 방법으로 확인 가능합니다.</p><ol><li><b>지도에서 직접:</b> 지도에서 원하는 지역을 클릭하면 시설물 마커가 표시됩니다.</li><li><b>좌측 패널:</b> 시·도별 현황에서 지역을 선택하면 걸침/구역내 목록을 확인할 수 있습니다.</li></ol>`, author: '관리자', date: '2026-03-15' },
      { category: '지도/레이어', q: '지도에서 하천 구역 경계를 표시하려면 어떻게 하나요?', a: `<p>지도 우측의 <b>[레이어 설정]</b> 버튼에서 '하천 구역 경계'를 활성화하세요.</p><ul><li><span style="color:#5b8def;">파란색 영역</span>: 하천 구역</li><li><span style="color:#ab7ae0;">보라색 영역</span>: 허가 구역</li><li><span style="color:#ff6b6b;">빨간색 마커</span>: 불법 시설물 위치</li></ul><p>레이어는 중복 표시 및 투명도 조절이 가능합니다.</p>`, author: '신상미', date: '2026-03-10' },
      { category: '시설물 조회', q: '시설물 상세 정보에서 확인할 수 있는 항목은?', a: `<p>기본 정보(시설물 유형, 소재지, GPS 좌표), 하천 관련 정보(하천명, 위치 유형, 경계 거리), 정비 현황(상태, 담당 기관, 일정)을 확인할 수 있습니다.</p>`, author: '관리자', date: '2026-03-05' },
      { category: '지도/레이어', q: '지도 위성 영상과 일반 지도를 전환하는 방법은?', a: `<p>지도 우측 상단의 <b>[지도 유형]</b> 버튼에서 일반 지도, 위성 영상, 하이브리드 중 선택할 수 있습니다. 불법 시설물 현장 확인 시에는 위성 영상 또는 하이브리드 모드를 권장합니다.</p>`, author: '신상미', date: '2026-02-28' },
      { category: '시설물 조회', q: '시·도별 불법 시설물 현황을 한눈에 보려면?', a: `<p>메인 대시보드 좌측 패널에 전국 시·도별 현황이 자동 표시됩니다. 걸침순, 구역내순, 지역명순으로 정렬할 수 있으며, 지도에서 시·도 영역을 클릭하면 하위 시·군·구 단위 현황도 확인 가능합니다.</p>`, author: '관리자', date: '2026-02-20' },
      { category: '계정/인증', q: '회원가입 승인은 얼마나 걸리나요?', a: `<p>일반적으로 <b>1~2 영업일</b> 이내 처리됩니다. 승인 완료 시 가입 시 등록한 이메일로 안내가 발송됩니다. 공휴일 및 주말에는 처리되지 않습니다.</p>`, author: '관리자', date: '2026-02-15' },
      { category: '계정/인증', q: '비밀번호를 분실했을 때 어떻게 하나요?', a: `<p>로그인 화면에서 <b>[비밀번호 찾기]</b>를 클릭 → 이름과 이메일 입력 → 인증번호 확인 → 새 비밀번호 설정 순서로 재설정할 수 있습니다.</p><p>비밀번호는 8자 이상, 영문+숫자+특수문자 조합이어야 합니다.</p>`, author: '관리자', date: '2026-02-10' },
      { category: '시스템 일반', q: '시스템 권장 브라우저와 해상도는?', a: `<p><b>Chrome 90+</b> (최우선 권장), Edge 90+, Firefox 88+ 을 지원합니다. IE는 지원되지 않습니다. 데스크탑 해상도 <b>1920×1080 이상</b>, 모바일은 반응형 지원됩니다.</p>`, author: '관리자', date: '2026-02-01' },
      { category: '시스템 일반', q: '시스템 이용 가능 시간은 어떻게 되나요?', a: `<p><b>365일 24시간</b> 상시 운영됩니다. 매월 첫째 주 일요일 02:00~06:00 정기점검 시 일시 중단되며, 점검 일정은 공지사항을 통해 사전 안내됩니다.</p>`, author: '관리자', date: '2026-01-20' }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.requireLogin ? Auth.requireLogin() : null;
      if (user) {
        document.getElementById('header-user-name').textContent = user.name + '님';
        document.getElementById('dd-user-name').textContent = user.name;
        document.getElementById('dd-user-org').textContent = user.org;
        document.getElementById('dd-user-role').textContent = user.roleLabel;
        const btn = document.getElementById('btn-logout');
        const dropdown = document.getElementById('user-dropdown');
        btn.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('active'); });
        document.addEventListener('click', () => dropdown.classList.remove('active'));

        // 관리 버튼 표시 (관리자인 경우)
        if (user.role === 'admin') {
          const adminBtn = document.getElementById('btn-nav-admin');
          if (adminBtn) adminBtn.style.display = 'flex';
        }
      }

      // FAQ 아코디언 렌더링
      const list = document.getElementById('faq-list');
      faqs.forEach((faq, i) => {
        const item = document.createElement('div');
        item.className = 'faq-item';
        item.innerHTML = `
          <button class="faq-question">
            <span class="faq-q-category">${faq.category}</span>
            <span class="faq-q-text">${faq.q}</span>
            <svg class="faq-q-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="faq-answer">
            <div class="faq-answer-inner">
              ${faq.a}
              <div class="faq-meta">${faq.date}</div>
            </div>
          </div>`;
        item.querySelector('.faq-question').addEventListener('click', () => {
          const wasOpen = item.classList.contains('open');
          // 다른 항목 닫기 (선택적 — 하나만 열리게)
          list.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
          if (!wasOpen) item.classList.add('open');
        });
        list.appendChild(item);
      });
    });
  </script>
</body>
