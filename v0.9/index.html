<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하천·계곡 및 주변 지역 불법 시설 정비 지원시스템</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .landing-box {
      max-width: 480px;
      text-align: center;
    }

    .landing-body {
      padding: 32px 28px 36px;
    }

    .landing-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .landing-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: var(--radius-md);
      background: var(--bg-panel, #f7f8fa);
      border: 1px solid var(--border-light, #e2e6ea);
      text-decoration: none;
      color: var(--text-primary);
      transition: box-shadow .2s, transform .15s;
      text-align: left;
    }

    .landing-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
      transform: translateY(-2px);
    }

    .landing-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary-dark, #0d3a6e), var(--primary, #1a5f9e));
    }

    .landing-card-icon svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      fill: none;
    }

    .landing-card-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .landing-card-title {
      font-size: var(--font-size-sm, 14px);
      font-weight: 700;
      color: var(--text-primary);
    }

    .landing-card-desc {
      font-size: var(--font-size-xs, 12px);
      color: var(--text-muted, #888);
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="auth-wrapper">
    <main class="auth-box landing-box" role="main">
      <!-- 헤더 -->
      <header class="auth-header">
        <div class="logo-icon">
          <img src="assets/img/main_logo_white.png" alt="시스템 로고"
            onerror="this.src='https://placehold.co/200x60?text=LOGO'">
        </div>
        <h1 class="service-name">하천·계곡 및 주변 지역<br>불법 시설 정비 지원시스템</h1>
        <p class="service-sub">River &amp; Valley Illegal Facility Management System</p>
      </header>

      <!-- 카드 -->
      <section class="landing-body">
        <div class="landing-cards">
          <!-- 요구사항 정의서 카드 -->
          <a href="requirements.html" target="_blank" class="landing-card">
            <div class="landing-card-icon">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </div>
            <div class="landing-card-text">
              <span class="landing-card-title">요구사항 정의서</span>
              <span class="landing-card-desc">시스템 요구사항을 정의하고 관리합니다</span>
            </div>
          </a>

          <!-- 화면 설계서 카드 -->
          <a href="storyboard.html" target="_blank" class="landing-card">
            <div class="landing-card-icon">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="landing-card-text">
              <span class="landing-card-title">화면 설계서</span>
              <span class="landing-card-desc">각 화면의 구성과 기능을 상세히 확인합니다</span>
            </div>
          </a>

          <!-- 프로토타입 카드 -->
          <a href="login.html" target="_blank" class="landing-card">
            <div class="landing-card-icon">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </div>
            <div class="landing-card-text">
              <span class="landing-card-title">프로토타입</span>
              <span class="landing-card-desc">동작하는 화면 프로토타입을 직접 확인합니다</span>
            </div>
          </a>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
