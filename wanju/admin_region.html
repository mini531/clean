  <script src="../js/common.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function initUserDropdown(user) {
      const btn = document.getElementById('btn-logout');
      const dropdown = document.getElementById('user-dropdown');
      if (!btn || !dropdown) return;

      document.getElementById('header-user-name').textContent = user.name + '님';
      document.getElementById('dd-user-name').textContent = user.name;
      document.getElementById('dd-user-org').textContent = user.org;
      document.getElementById('dd-user-role').textContent = user.roleLabel;

      btn.addEventListener('click', e => {
        e.stopPropagation();
        dropdown.classList.toggle('active');
      });
      document.addEventListener('click', () => { dropdown.classList.remove('active'); });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.requireLogin ? Auth.requireLogin() : null;
      if (user) {
        initUserDropdown(user);
        if (user.role !== 'admin') {
          location.href = 'dashboard.html';
        }
      }

    // ── 지역 이용 현황 차트 ──
    (function() {
      const chartArea = document.getElementById('region-chart-area');
      const chartTitle = document.getElementById('region-chart-title');
      const chartTotal = document.getElementById('region-chart-total');
      const startInput = document.getElementById('region-date-start');
      const endInput = document.getElementById('region-date-end');
      const btnSearch = document.getElementById('region-search');
      const btnReset = document.getElementById('region-reset');

      const today = new Date();
      const fmt = d => d.toISOString().split('T')[0];
      startInput.value = fmt(today);
      endInput.value = fmt(today);

      // 시·군·구 단위 지역 데이터 (가상)
      const regions = [
        '경기 수원시','경기 안성시','경기 시흥시','경기 고양시','경기 용인시','경기 안양시','경기 평택시',
        '강원 춘천시','강원 원주시','강원 강릉시','강원 속초시',
        '경북 포항시','경북 경주시','경북 안동시','경북 구미시',
        '경남 창원시','경남 김해시','경남 진주시','경남 거제시',
        '전북 전주시','전북 익산시','전북 군산시','전북 남원시',
        '전남 순천시','전남 여수시','전남 목포시','전남 광양시',
        '충남 천안시','충남 아산시','충남 서산시','충남 당진시',
        '충북 청주시','충북 충주시','충북 제천시',
        '서울 강남구','서울 송파구','서울 마포구','서울 영등포구',
        '대전 유성구','대전 서구','대구 수성구','대구 달서구',
        '부산 해운대구','부산 사하구','인천 남동구','인천 연수구',
        '광주 북구','울산 남구','제주 제주시','제주 서귀포시'
      ];

      function generateData() {
        return regions.map(name => ({
          name,
          count: Math.floor(Math.random() * 150) + 5
        })).sort((a, b) => b.count - a.count).slice(0, 20);
      }

      function renderChart(data) {
        const max = Math.max(...data.map(d => d.count), 1);
        const total = data.reduce((a, b) => a + b.count, 0);
        chartTotal.textContent = `총 ${total.toLocaleString()}건`;

        chartArea.innerHTML = '<div class="mini-bar-group">' +
          data.map((item, i) => {
            const pct = Math.round((item.count / max) * 100);
            return `<div class="mini-bar-row" style="position:relative; cursor:pointer;" onmouseenter="this.querySelector('.region-tip').style.display='block'" onmouseleave="this.querySelector('.region-tip').style.display='none'">
              <span class="mini-bar-label" style="min-width:120px; text-align:left;">${i + 1}. ${item.name}</span>
              <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
              <span class="mini-bar-val">${item.count.toLocaleString()}</span>
              <div class="region-tip" style="display:none; position:absolute; left:110px; top:-28px; padding:6px 12px; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); border-radius:6px; font-size:12px; color:#fff; white-space:nowrap; z-index:10; pointer-events:none;">
                ${item.name}: <b style="color:#64b5f6;">${item.count.toLocaleString()}건</b>
              </div>
            </div>`;
          }).join('') + '</div>';
      }

      function updateChart() {
        const s = startInput.value;
        const e = endInput.value;
        const isToday = s === fmt(today) && e === fmt(today);
        const label = !s && !e ? '전체' : isToday ? '오늘' : s === e ? s : `${s} ~ ${e}`;
        chartTitle.textContent = `지도 조회 TOP 20 (${label})`;
        renderChart(generateData());
      }

      // 기간 버튼
      document.querySelectorAll('#page-region .adm-period-btn').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.preventDefault();
          const months = parseInt(btn.dataset.months);
          if (months === -1) {
            startInput.value = fmt(today);
            endInput.value = fmt(today);
          } else if (months === 0) {
            startInput.value = '';
            endInput.value = '';
          } else {
            const start = new Date();
            start.setMonth(today.getMonth() - months);
            startInput.value = fmt(start);
            endInput.value = fmt(today);
          }
        });
      });

      btnSearch.addEventListener('click', updateChart);

      btnReset.addEventListener('click', () => {
        startInput.value = fmt(today);
        endInput.value = fmt(today);
        updateChart();
      });

      // 초기 렌더링
      updateChart();
    })();

    // Mobile sidebar toggle
    (function() {
      const hamburger = document.getElementById('adm-hamburger');
      const sidebar = document.getElementById('adm-sidebar');
      const backdrop = document.getElementById('adm-sidebar-backdrop');
      const closeBtn = document.getElementById('adm-sidebar-close');
      if (!hamburger || !sidebar) return;
      function openSidebar() { sidebar.classList.add('open'); backdrop.classList.add('active'); }
      function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('active'); }
      hamburger.addEventListener('click', openSidebar);
      closeBtn.addEventListener('click', closeSidebar);
      backdrop.addEventListener('click', closeSidebar);
    })();
    });
  </script>
